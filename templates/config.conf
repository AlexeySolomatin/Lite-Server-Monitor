# =============================================================================
# Lite Server Monitor (LSM) - Main Configuration
# =============================================================================

[general]
hostname = ""
log_level = "INFO"
log_file = "/var/log/lsm/lsm.log"

[alerts]
enable_alerts = true
alert_email = "admin@example.com"
telegram_bot_token = ""
telegram_chat_id = ""

[thresholds]
cpu_usage_warn = 80
cpu_usage_crit = 95
ram_usage_warn = 85
ram_usage_crit = 95
disk_usage_warn = 85
disk_usage_crit = 95

[modules]
enable_system = true
enable_raid = true
enable_smart = true
enable_temperature = true
enable_ups = false
