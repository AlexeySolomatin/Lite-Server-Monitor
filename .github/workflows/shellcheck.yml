name: ShellCheck

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # Проверяем все .sh файлы в репозитории
          find . -type f -name "*.sh" ! -path "./node_modules/*" ! -path "./vendor/*" -print0 | xargs -0 -r shellcheck
